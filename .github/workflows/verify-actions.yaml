name: Verify Actions

on:
  pull_request:
    paths:
      - actions/setup-sui-cli/**
      - bun.lock
      - package.json
      - tsconfig.json
      - .github/workflows/verify-actions.yaml
  push:
    branches:
      - main
    paths:
      - actions/setup-sui-cli/**
      - bun.lock
      - package.json
      - tsconfig.json
      - .github/workflows/verify-actions.yaml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  verify-setup-sui-cli:
    name: Verify setup-sui-cli bundle
    runs-on: ubuntu-latest
    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@v6

      - name: 🥟 Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏗 Rebuild action bundle
        working-directory: actions/setup-sui-cli
        run: bun run build

      - name: 🔎 Verify committed bundle
        run: git diff --exit-code -- actions/setup-sui-cli/dist/index.js